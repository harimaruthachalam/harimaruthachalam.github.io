name: Deploy site to GitHub Pages

# Triggers:
#  - any push to master
#  - manual run from the Actions tab (useful right after flipping
#    Pages source to "GitHub Actions" for the first time)
on:
  push:
    branches: [master]
  workflow_dispatch:

# Required by actions/deploy-pages@v4
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid two deploys racing each other; let the in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
