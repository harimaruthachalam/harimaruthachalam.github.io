<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Theme-aware monogram favicon. Uses CSS @media queries inside the
    SVG so the colours flip with the user's system theme — same warm
    orange + paper-vs-ink palette as the site itself. Falls back to the
    dark variant on browsers that don't honour prefers-color-scheme in
    favicon SVGs (which is fine: that's the site's default theme too).
  -->
  <defs>
    <style>
      .bg { fill: #0b0b0d; }
      .fg { fill: #e96f3a; }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f8f5ee; }
        .fg { fill: #c5471a; }
      }
    </style>
  </defs>
  <rect class="bg" width="32" height="32" rx="8" />
  <text
    class="fg"
    x="16"
    y="23.5"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-size="23"
    font-weight="600"
    font-style="italic"
    text-anchor="middle"
  >S</text>
</svg>
